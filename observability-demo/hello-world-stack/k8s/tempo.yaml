apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.5.0
          args: ["-config.file=/etc/tempo/config.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4318
          startupProbe:
            httpGet:
              path: /ready
              port: 3200
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /etc/tempo/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: observability-tempo-config
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability-demo
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-http
      port: 4318
      targetPort: 4318
