apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: app
          image: localhost:32000/observability-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: APP_LOG_DIR
              value: /var/log/demo-app
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://localhost:4318/v1/traces
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/demo-app

        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.106.1
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - containerPort: 4318
            - containerPort: 8889
          startupProbe:
            tcpSocket:
              port: 4318
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 4318
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4318
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: collector-config
              mountPath: /etc/otelcol/config.yaml
              subPath: config.yaml
            - name: app-logs
              mountPath: /var/log/demo-app

      volumes:
        - name: app-logs
          emptyDir: {}
        - name: collector-config
          configMap:
            name: observability-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: observability-demo
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-nodeport
  namespace: observability-demo
spec:
  type: NodePort
  selector:
    app: demo-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30088
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-collector-metrics
  namespace: observability-demo
spec:
  selector:
    app: demo-app
  ports:
    - name: metrics
      port: 8889
      targetPort: 8889
