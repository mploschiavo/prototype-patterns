apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-prometheus-config
  namespace: observability-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      - job_name: demo-app
        metrics_path: /metrics
        static_configs:
          - targets: ["demo-app:8080"]

      - job_name: otel-collector
        metrics_path: /metrics
        static_configs:
          - targets: ["demo-app-collector-metrics:8889"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-collector-config
  namespace: observability-demo
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318

      filelog:
        include: [/var/log/demo-app/*.log]
        start_at: beginning

    processors:
      batch:

    exporters:
      otlphttp/tempo:
        endpoint: http://tempo:4318

      loki:
        endpoint: http://loki:3100/loki/api/v1/push

      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/tempo]

        logs:
          receivers: [filelog]
          processors: [batch]
          exporters: [loki]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-loki-config
  namespace: observability-demo
data:
  config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      allow_structured_metadata: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-tempo-config
  namespace: observability-demo
data:
  config.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-grafana-datasources
  namespace: observability-demo
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
