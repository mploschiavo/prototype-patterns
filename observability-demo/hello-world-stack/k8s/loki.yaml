apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.1.1
          args: ["-config.file=/etc/loki/config.yaml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: observability-loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability-demo
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
