services:
  demo-app:
    build:
      context: ..
      dockerfile: app/Dockerfile
    image: prototype/observability-demo-app:latest
    environment:
      PORT: "8080"
      APP_LOG_DIR: /var/log/demo-app
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    volumes:
      - app_logs:/var/log/demo-app
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - app_logs:/var/log/demo-app:ro
    ports:
      - "4318:4318"
      - "8889:8889"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./config/loki-config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./config/tempo-config.yaml:/etc/tempo/config.yaml:ro
    ports:
      - "3200:3200"
      - "4319:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  app_logs:
