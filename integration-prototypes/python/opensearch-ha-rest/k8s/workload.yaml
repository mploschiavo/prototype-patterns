apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-opensearch-ha-rest
  namespace: integration-clients
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-opensearch-ha-rest
  template:
    metadata:
      labels:
        app: python-opensearch-ha-rest
    spec:
      containers:
        - name: app
          image: prototype/python-opensearch-ha-rest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          env:
            - name: PORT
              value: "8080"
            - name: OPENSEARCH_NODES
              value: "http://opensearch-ha-0.opensearch-ha-headless.integration-opensearch-ha.svc.cluster.local:9200,http://opensearch-ha-1.opensearch-ha-headless.integration-opensearch-ha.svc.cluster.local:9200,http://opensearch-ha-2.opensearch-ha-headless.integration-opensearch-ha.svc.cluster.local:9200"
---
apiVersion: v1
kind: Service
metadata:
  name: python-opensearch-ha-rest
  namespace: integration-clients
spec:
  selector:
    app: python-opensearch-ha-rest
  ports:
    - name: http
      port: 8080
      targetPort: 8080
