apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-postgres-rest
  namespace: integration-clients
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-postgres-rest
  template:
    metadata:
      labels:
        app: python-postgres-rest
    spec:
      containers:
        - name: app
          image: prototype/python-postgres-rest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: POSTGRES_DSN
              value: "postgresql://prototype_user:prototype_pass@postgres.integration-postgres.svc.cluster.local:5432/prototype_db"
---
apiVersion: v1
kind: Service
metadata:
  name: python-postgres-rest
  namespace: integration-clients
spec:
  selector:
    app: python-postgres-rest
  ports:
    - name: http
      port: 8080
      targetPort: 8080
