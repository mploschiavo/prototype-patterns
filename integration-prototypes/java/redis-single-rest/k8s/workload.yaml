apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-redis-single-rest
  namespace: integration-clients
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-redis-single-rest
  template:
    metadata:
      labels:
        app: java-redis-single-rest
    spec:
      containers:
        - name: app
          image: prototype/java-redis-single-rest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_URL
              value: "redis://redis-single.integration-redis-single.svc.cluster.local:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: java-redis-single-rest
  namespace: integration-clients
spec:
  selector:
    app: java-redis-single-rest
  ports:
    - name: http
      port: 8080
      targetPort: 8080
