apiVersion: apps/v1
kind: Deployment
metadata:
  name: csharp-redis-ha-rest
  namespace: integration-clients
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csharp-redis-ha-rest
  template:
    metadata:
      labels:
        app: csharp-redis-ha-rest
    spec:
      containers:
        - name: app
          image: prototype/csharp-redis-ha-rest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_CLUSTER_ENDPOINTS
              value: "redis-ha-1.integration-redis-ha.svc.cluster.local:6379,redis-ha-2.integration-redis-ha.svc.cluster.local:6379,redis-ha-3.integration-redis-ha.svc.cluster.local:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: csharp-redis-ha-rest
  namespace: integration-clients
spec:
  selector:
    app: csharp-redis-ha-rest
  ports:
    - name: http
      port: 8080
      targetPort: 8080
