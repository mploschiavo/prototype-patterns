apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-rag-docs
  namespace: integration-ollama-single
data:
  rag-documents.json: |
    [
      {
        "id": "doc-1",
        "text": "Prototype patterns repository includes Kafka, Redis, Postgres, OpenSearch, and Ollama integration demos."
      },
      {
        "id": "doc-2",
        "text": "MicroK8s deployments use kustomize manifests and NodePort services for local testing."
      },
      {
        "id": "doc-3",
        "text": "Agentic MCP examples provide tools for rag.search and agent.answer over Ollama."
      }
    ]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: integration-ollama-single
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: integration-ollama-single
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.3.14
          ports:
            - containerPort: 11434
          startupProbe:
            tcpSocket:
              port: 11434
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            - name: rag-docs
              mountPath: /seed/rag-documents.json
              subPath: rag-documents.json
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
        - name: rag-docs
          configMap:
            name: ollama-rag-docs
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: integration-ollama-single
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-nodeport
  namespace: integration-ollama-single
spec:
  type: NodePort
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      nodePort: 31434
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-seed-model
  namespace: integration-ollama-single
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: ollama/ollama:0.3.14
          env:
            - name: OLLAMA_HOST
              value: http://ollama:11434
          command: ["/bin/sh", "-c"]
          args:
            - |
              until ollama list >/dev/null 2>&1; do sleep 2; done
              ollama pull tinyllama
