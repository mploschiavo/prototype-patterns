services:
  opensearch-1:
    image: opensearchproject/opensearch:2.14.0
    container_name: opensearch-single-1
    environment:
      cluster.name: prototype-opensearch-single
      node.name: opensearch-single-1
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_single_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: opensearch-single-dashboards
    depends_on:
      opensearch-1:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-1:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  opensearch-init:
    image: curlimages/curl:8.8.0
    container_name: opensearch-single-init
    depends_on:
      opensearch-1:
        condition: service_healthy
    volumes:
      - ./seed:/seed:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      /seed/seed-single.sh

volumes:
  opensearch_single_data:
