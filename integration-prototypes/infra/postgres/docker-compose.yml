services:
  postgres:
    image: postgres:16-alpine
    container_name: prototype-postgres
    environment:
      POSTGRES_DB: prototype_db
      POSTGRES_USER: prototype_user
      POSTGRES_PASSWORD: prototype_pass
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prototype_user -d prototype_db -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
