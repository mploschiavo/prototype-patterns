apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ha-1
  namespace: integration-kafka-ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ha
      broker: "1"
  template:
    metadata:
      labels:
        app: kafka-ha
        broker: "1"
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          env:
            - { name: KAFKA_CFG_NODE_ID, value: "1" }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka-ha-1:9092" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "1@kafka-ha-1:9093,2@kafka-ha-2:9093,3@kafka-ha-3:9093" }
            - { name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_CFG_NUM_PARTITIONS, value: "3" }
            - { name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "3" }
            - { name: KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "3" }
            - { name: KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR, value: "2" }
            - { name: KAFKA_KRAFT_CLUSTER_ID, value: "zyxwvutsrqponmlkjihgfe" }
            - { name: ALLOW_PLAINTEXT_LISTENER, value: "yes" }
          ports:
            - containerPort: 9092
            - containerPort: 9093
---
