---
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-ha-init
  namespace: integration-redis-ha
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: redis-init
          image: redis:7-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              until redis-cli -h redis-ha-1 -p 6379 ping; do sleep 1; done
              until redis-cli -h redis-ha-2 -p 6379 ping; do sleep 1; done
              until redis-cli -h redis-ha-3 -p 6379 ping; do sleep 1; done
              yes yes | redis-cli --cluster create redis-ha-1:6379 redis-ha-2:6379 redis-ha-3:6379 --cluster-replicas 0
              redis-cli -c -h redis-ha-1 -p 6379 set demo:key '{"id":1,"value":"hello redis ha"}'
