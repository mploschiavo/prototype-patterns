apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-ha-1
  namespace: integration-redis-ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-ha
      node: "1"
  template:
    metadata:
      labels:
        app: redis-ha
        node: "1"
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--port", "6379", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-ha-2
  namespace: integration-redis-ha
